<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Работа рядом</title>
    <meta name="theme-color" content="#040307" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --black: #040307;
        --panel: #0b0710;
        --panel-2: #12061d;
        --line: rgba(148, 98, 214, 0.28);
        --gold: #d6a23a;
        --gold-light: #f1ca63;
        --green: #071d13;
        --green-line: rgba(128, 223, 164, 0.26);
        --text: #fff8ea;
        --muted: #b9adc8;
        --danger: #ffcd9b;
        --radius: 8px;
        color: var(--text);
        background: var(--black);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: var(--black); }
      button, textarea { font: inherit; }
      button { cursor: pointer; }
      h1, p { margin: 0; }

      .app {
        width: min(480px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 16px 14px 84px;
        background:
          radial-gradient(circle at 18% 0%, rgba(86, 35, 150, 0.34), transparent 31%),
          linear-gradient(180deg, #12061d 0%, #040307 62%);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      h1 { font-size: 28px; line-height: 1.05; letter-spacing: 0; }
      .subtitle { margin-top: 5px; color: var(--muted); font-size: 14px; font-weight: 760; }

      .safe {
        flex: 0 0 auto;
        border: 1px solid var(--green-line);
        border-radius: 999px;
        padding: 8px 10px;
        color: #dff8ea;
        background: var(--green);
        font-size: 13px;
        font-weight: 900;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 4px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(4, 3, 7, 0.7);
      }

      .tabs button {
        min-height: 50px;
        border: 0;
        border-radius: var(--radius);
        color: var(--muted);
        background: transparent;
        font-weight: 920;
      }

      .tabs button.active {
        color: #140b05;
        background: linear-gradient(180deg, var(--gold-light), var(--gold));
      }

      .panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          radial-gradient(circle at 100% 0%, rgba(214, 162, 58, 0.12), transparent 36%),
          linear-gradient(180deg, rgba(22, 8, 36, 0.98), rgba(7, 5, 11, 0.98));
      }

      .label { color: var(--text); font-size: 18px; font-weight: 950; }

      textarea {
        width: 100%;
        min-height: 96px;
        resize: none;
        border: 1px solid rgba(241, 202, 99, 0.18);
        border-radius: var(--radius);
        padding: 13px;
        color: var(--text);
        outline: none;
        background: rgba(4, 3, 7, 0.74);
      }

      textarea::placeholder { color: #847891; }
      textarea:focus { border-color: rgba(241, 202, 99, 0.62); }

      .chips {
        display: flex;
        gap: 7px;
        overflow-x: auto;
        padding-bottom: 1px;
        scrollbar-width: none;
      }

      .chips::-webkit-scrollbar { display: none; }

      .chip, .choice {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(18, 6, 29, 0.92);
        font-weight: 880;
        white-space: nowrap;
      }

      .chip { padding: 0 12px; }

      .chip.active, .choice.active {
        color: #140b05;
        border-color: var(--gold-light);
        background: var(--gold);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .choice {
        min-height: 44px;
        border-radius: var(--radius);
      }

      .primary, .secondary {
        min-height: 56px;
        border-radius: var(--radius);
        font-weight: 970;
      }

      .primary {
        border: 1px solid rgba(241, 202, 99, 0.58);
        color: #140b05;
        background: linear-gradient(180deg, var(--gold-light), var(--gold));
      }

      .secondary {
        border: 1px solid var(--green-line);
        color: #dff8ea;
        background: var(--green);
      }

      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .status.alert { color: var(--danger); }

      .bottom {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(480px, 100%);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        padding: 7px 9px max(7px, env(safe-area-inset-bottom));
        border-top: 1px solid rgba(241, 202, 99, 0.16);
        background: rgba(4, 3, 7, 0.97);
        backdrop-filter: blur(18px);
      }

      .bottom button {
        min-height: 52px;
        border: 0;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 880;
      }

      .bottom button.active { color: var(--gold-light); }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Работа рядом</h1>
          <p class="subtitle" id="subtitle">Найти человека или работу рядом</p>
        </div>
        <span class="safe">Защита</span>
      </header>

      <section class="tabs" aria-label="Режим">
        <button id="customerTab" class="active" type="button">Нужен исполнитель</button>
        <button id="workerTab" type="button">Ищу работу</button>
      </section>

      <section class="panel">
        <label class="label" for="query" id="queryLabel">Что нужно сделать?</label>
        <textarea id="query" autocomplete="off" maxlength="240" placeholder="Коротко опишите задачу"></textarea>

        <section class="chips" aria-label="Категории" id="categoryChips"></section>

        <section class="grid" aria-label="Формат">
          <button class="choice active" type="button" data-scope="near">Рядом</button>
          <button class="choice" type="button" data-scope="remote">Удалённо</button>
        </section>

        <section class="grid" aria-label="Доверие">
          <button class="choice active" type="button" data-trust="any">Любой опыт</button>
          <button class="choice" type="button" data-trust="verified">Проверенный</button>
        </section>

        <button class="primary" type="button" id="primaryAction">Найти исполнителя</button>
        <button class="secondary" type="button" id="secondaryAction">Создать заказ</button>
        <p class="status" id="status" aria-live="polite"></p>
      </section>

      <nav class="bottom" aria-label="Главное меню">
        <button class="active" type="button" data-nav="find">Найти</button>
        <button type="button" data-nav="create">Создать</button>
        <button type="button" data-nav="mine">Мои</button>
      </nav>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const categories = ['Дом', 'Ремонт', 'Доставка', 'Уборка', 'Красота', 'Фриланс', 'Срочно'];
      const state = {
        mode: new URLSearchParams(window.location.search).get('mode') === 'workers' ? 'worker' : 'customer',
        category: categories[0],
        scope: 'near',
        trust: 'any'
      };

      const els = {
        subtitle: document.getElementById('subtitle'),
        customerTab: document.getElementById('customerTab'),
        workerTab: document.getElementById('workerTab'),
        queryLabel: document.getElementById('queryLabel'),
        query: document.getElementById('query'),
        categoryChips: document.getElementById('categoryChips'),
        primary: document.getElementById('primaryAction'),
        secondary: document.getElementById('secondaryAction'),
        status: document.getElementById('status')
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderCategories() {
        els.categoryChips.innerHTML = categories.map((category) => (
          `<button class="chip ${category === state.category ? 'active' : ''}" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>`
        )).join('');
      }

      function setMode(mode) {
        state.mode = mode;
        els.customerTab.classList.toggle('active', mode === 'customer');
        els.workerTab.classList.toggle('active', mode === 'worker');
        els.subtitle.textContent = mode === 'customer' ? 'Найти исполнителя рядом' : 'Найти работу рядом';
        els.queryLabel.textContent = mode === 'customer' ? 'Что нужно сделать?' : 'Какую работу ищете?';
        els.query.placeholder = mode === 'customer' ? 'Коротко опишите задачу' : 'Коротко опишите навык или работу';
        els.primary.textContent = mode === 'customer' ? 'Найти исполнителя' : 'Найти работу';
        els.secondary.textContent = mode === 'customer' ? 'Создать заказ' : 'Стать исполнителем';
        els.status.textContent = '';
        updateMainButton();
      }

      function payload(action) {
        return {
          source: 'mini_app',
          action,
          role: state.mode,
          category: state.category,
          scope: state.scope,
          trust: state.trust,
          text: els.query.value.trim(),
          at: new Date().toISOString()
        };
      }

      function submit(action) {
        const data = payload(action);
        localStorage.setItem('work_nearby_last_intent', JSON.stringify(data));

        if (tg?.sendData) {
          tg.sendData(JSON.stringify(data));
          els.status.className = 'status';
          els.status.textContent = 'Отправлено в Telegram';
          return;
        }

        els.status.className = 'status alert';
        els.status.textContent = 'Откройте через Telegram';
      }

      function updateMainButton() {
        if (!tg?.MainButton) return;
        tg.MainButton.setText(state.mode === 'customer' ? 'Найти исполнителя' : 'Найти работу');
        tg.MainButton.show();
      }

      els.customerTab.addEventListener('click', () => setMode('customer'));
      els.workerTab.addEventListener('click', () => setMode('worker'));
      els.primary.addEventListener('click', () => submit('find'));
      els.secondary.addEventListener('click', () => submit(state.mode === 'customer' ? 'create_order' : 'create_worker_profile'));

      document.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        const category = target.dataset.category;
        if (category) {
          state.category = category;
          renderCategories();
          return;
        }

        const scope = target.dataset.scope;
        if (scope) {
          state.scope = scope;
          document.querySelectorAll('[data-scope]').forEach((button) => button.classList.toggle('active', button === target));
          return;
        }

        const trust = target.dataset.trust;
        if (trust) {
          state.trust = trust;
          document.querySelectorAll('[data-trust]').forEach((button) => button.classList.toggle('active', button === target));
          return;
        }

        const nav = target.dataset.nav;
        if (nav === 'create') {
          submit(state.mode === 'customer' ? 'create_order' : 'create_worker_profile');
        }
      });

      tg?.MainButton?.onClick(() => submit('find'));
      renderCategories();
      setMode(state.mode);
    </script>
  </body>
</html>
