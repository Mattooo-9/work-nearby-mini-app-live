<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Nearby | Рядом</title>
    <meta name="theme-color" content="#040307" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --black: #040307;
        --panel: #0b0710;
        --panel-2: #12061d;
        --line: rgba(148, 98, 214, 0.28);
        --line-soft: rgba(241, 202, 99, 0.16);
        --gold: #d6a23a;
        --gold-light: #f1ca63;
        --green: #071d13;
        --green-line: rgba(128, 223, 164, 0.26);
        --text: #fff8ea;
        --muted: #b9adc8;
        --danger: #ffcd9b;
        --nav-height: 72px;
        --radius: 8px;
        color: var(--text);
        background: var(--black);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; overflow: hidden; background: var(--black); }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      h1, h2, p { margin: 0; }

      .app {
        position: relative;
        width: min(480px, 100%);
        height: var(--tg-viewport-height, 100vh);
        min-height: 100vh;
        margin: 0 auto;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        padding: 16px 14px calc(var(--nav-height) + 28px + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 18% 0%, rgba(86, 35, 150, 0.28), transparent 30%),
          linear-gradient(180deg, var(--panel-2), var(--black) 58%);
      }

      .screen { display: grid; gap: 12px; min-height: calc(var(--tg-viewport-height, 100vh) - var(--nav-height)); }
      h1 { font-size: 28px; line-height: 1.08; letter-spacing: 0; }
      h2 { font-size: 18px; line-height: 1.15; letter-spacing: 0; }

      .field { display: grid; gap: 7px; }
      .field > span { color: var(--text); font-size: 15px; font-weight: 850; }

      input, textarea {
        width: 100%;
        border: 1px solid rgba(241, 202, 99, 0.18);
        border-radius: var(--radius);
        padding: 13px;
        color: var(--text);
        outline: none;
        background: rgba(4, 3, 7, 0.74);
      }

      textarea { min-height: 100px; resize: vertical; }
      input::placeholder, textarea::placeholder { color: #847891; }
      input:focus, textarea:focus { border-color: rgba(241, 202, 99, 0.62); }

      .chips { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
      .chips::-webkit-scrollbar { display: none; }

      .chip, .segmented button {
        min-height: 40px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: rgba(18, 6, 29, 0.9);
        font-weight: 850;
      }

      .chip { flex: 0 0 auto; border-radius: 999px; padding: 0 12px; }
      .chip.active, .segmented button.active {
        color: #140b05;
        border-color: var(--gold-light);
        background: var(--gold);
      }

      .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .segmented button { border-radius: var(--radius); }

      .btn {
        width: 100%;
        min-height: 54px;
        border-radius: var(--radius);
        border: 1px solid rgba(241, 202, 99, 0.58);
        color: #140b05;
        background: linear-gradient(180deg, var(--gold-light), var(--gold));
        font-weight: 950;
      }

      .btn.safe {
        border-color: var(--green-line);
        color: #dff8ea;
        background: var(--green);
      }

      .status { min-height: 20px; color: var(--muted); font-size: 14px; line-height: 1.35; }
      .status.alert { color: var(--danger); }
      .results, .menu-list { display: grid; gap: 10px; }

      .card, .empty {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(11, 7, 16, 0.9);
      }

      .card { display: grid; gap: 11px; padding: 14px; }
      .card p, .empty p, .meta span, .menu-list small { color: var(--muted); font-size: 14px; line-height: 1.35; }

      .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .meta span {
        min-height: 34px;
        display: flex;
        align-items: center;
        padding: 8px 9px;
        border: 1px solid rgba(241, 202, 99, 0.12);
        border-radius: var(--radius);
        background: rgba(4, 3, 7, 0.4);
      }

      .meta .trust { color: #dff8ea; border-color: var(--green-line); }
      .empty { display: grid; gap: 6px; padding: 16px; }

      .menu-list button {
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0 13px;
        color: var(--text);
        background: rgba(11, 7, 16, 0.9);
        text-align: left;
        font-weight: 880;
      }

      .bottom {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 10;
        transform: translateX(-50%);
        width: min(480px, 100%);
        height: calc(var(--nav-height) + env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        padding: 7px 9px max(7px, env(safe-area-inset-bottom));
        border-top: 1px solid var(--line-soft);
        background: rgba(4, 3, 7, 0.97);
        backdrop-filter: blur(18px);
      }

      .bottom button {
        min-height: 50px;
        border: 0;
        border-radius: var(--radius);
        color: var(--muted);
        background: transparent;
        font-size: 13px;
        font-weight: 900;
      }

      .bottom button.active { color: var(--gold-light); background: rgba(214, 162, 58, 0.09); }
    </style>
  </head>
  <body>
    <main class="app" id="app"></main>
    <nav class="bottom" aria-label="Главное меню">
      <button class="active" type="button" data-tab="find">Найти</button>
      <button type="button" data-tab="create">Создать</button>
      <button type="button" data-tab="mine">Мои</button>
    </nav>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const categories = ['Дом', 'Ремонт', 'Доставка', 'Уборка', 'Красота', 'Фриланс', 'Срочно'];
      const state = {
        tab: new URLSearchParams(location.search).get('tab') || 'find',
        find: { text: '', category: 'Дом', format: 'near', trust: 'any' },
        order: { description: '', category: 'Дом', location: '', budget: '', urgency: 'today', format: 'near' },
        workers: [],
        publishedOrder: null,
        status: ''
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function payload(action, data) {
        return { source: 'nearby_mini_app', action, data, at: new Date().toISOString() };
      }

      function send(action, data) {
        const body = payload(action, data);
        localStorage.setItem('nearby_last_payload', JSON.stringify(body));
        if (tg?.sendData) {
          tg.sendData(JSON.stringify(body));
          state.status = 'Отправлено в Telegram';
        } else {
          state.status = 'Откройте через Telegram';
        }
      }

      function workersFor(form) {
        const distance = form.format === 'near' ? ['0.8 км', '1.6 км', '2.4 км'] : ['Удалённо', 'Удалённо', 'Удалённо'];
        const trust = form.trust === 'verified' ? 'Проверенный' : 'Базовый';
        return [
          { id: 'nearby-worker-1', name: form.trust === 'verified' ? 'verified_pro' : 'nearby_master', category: form.category, distance: distance[0], rating: '4.9', priceFrom: form.category === 'Фриланс' ? 'от 900 грн' : 'от 500 грн', trustBadge: trust },
          { id: 'nearby-worker-2', name: 'fast_helper', category: form.category, distance: distance[1], rating: '4.8', priceFrom: form.category === 'Срочно' ? 'от 700 грн' : 'от 450 грн', trustBadge: trust },
          { id: 'nearby-worker-3', name: 'new_worker', category: form.category, distance: distance[2], rating: 'новый', priceFrom: 'договорная', trustBadge: form.trust === 'verified' ? 'Фото и телефон' : 'Новичок' }
        ];
      }

      function field(label, inner) {
        return `<section class="field"><span>${escapeHtml(label)}</span>${inner}</section>`;
      }

      function chips(value, target) {
        return `<div class="chips">${categories.map((category) => (
          `<button class="chip ${category === value ? 'active' : ''}" type="button" data-${target}="${escapeHtml(category)}">${escapeHtml(category)}</button>`
        )).join('')}</div>`;
      }

      function segmented(items, value, target) {
        return `<div class="segmented">${items.map((item) => (
          `<button class="${item.value === value ? 'active' : ''}" type="button" data-${target}="${escapeHtml(item.value)}">${escapeHtml(item.label)}</button>`
        )).join('')}</div>`;
      }

      function empty(title, text) {
        return `<section class="empty"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(text)}</p></section>`;
      }

      function workerCard(worker) {
        return `
          <article class="card">
            <div><h2>${escapeHtml(worker.name)}</h2><p>${escapeHtml(worker.category)}</p></div>
            <div class="meta">
              <span>${escapeHtml(worker.distance)}</span>
              <span>★ ${escapeHtml(worker.rating)}</span>
              <span>${escapeHtml(worker.priceFrom)}</span>
              <span class="trust">${escapeHtml(worker.trustBadge)}</span>
            </div>
            <button class="btn safe" type="button" data-worker="${escapeHtml(worker.id)}">Выбрать</button>
          </article>
        `;
      }

      function orderCard(order) {
        return `
          <article class="card">
            <h2>${escapeHtml(order.title)}</h2>
            <div class="meta">
              <span>${escapeHtml(order.category)}</span>
              <span>${escapeHtml(order.location)}</span>
              <span>${escapeHtml(order.budget)}</span>
              <span>${escapeHtml(order.urgency)}</span>
            </div>
          </article>
        `;
      }

      function renderFind() {
        const form = state.find;
        return `
          <section class="screen">
            <h1>Найти исполнителя</h1>
            ${field('Что нужно сделать?', `<textarea data-input="find.text" maxlength="240" placeholder="Например: доставить, починить, убрать">${escapeHtml(form.text)}</textarea>`)}
            ${field('Категория', chips(form.category, 'find-category'))}
            ${field('Формат', segmented([{ value: 'near', label: 'Рядом' }, { value: 'remote', label: 'Удалённо' }], form.format, 'find-format'))}
            ${field('Уровень доверия', segmented([{ value: 'any', label: 'Любой' }, { value: 'verified', label: 'Проверенный' }], form.trust, 'find-trust'))}
            <button class="btn" type="button" data-action="find">Найти</button>
            <p class="status ${state.status === 'Откройте через Telegram' ? 'alert' : ''}">${escapeHtml(state.status)}</p>
            <section class="results">
              ${state.workers.length ? state.workers.map(workerCard).join('') : empty('Исполнители появятся здесь', 'Выберите параметры и нажмите «Найти».')}
            </section>
          </section>
        `;
      }

      function renderCreate() {
        const form = state.order;
        return `
          <section class="screen">
            <h1>Создать заказ</h1>
            ${field('Описание задачи', `<textarea data-input="order.description" maxlength="320" placeholder="Что нужно сделать?">${escapeHtml(form.description)}</textarea>`)}
            ${field('Категория', chips(form.category, 'order-category'))}
            ${field('Локация', `<input data-input="order.location" value="${escapeHtml(form.location)}" placeholder="Город или район" />`)}
            ${field('Бюджет', `<input data-input="order.budget" value="${escapeHtml(form.budget)}" inputmode="numeric" placeholder="Например: 800 грн" />`)}
            ${field('Срочность', segmented([{ value: 'today', label: 'Сегодня' }, { value: 'week', label: 'На неделе' }], form.urgency, 'order-urgency'))}
            ${field('Формат', segmented([{ value: 'near', label: 'Рядом' }, { value: 'remote', label: 'Удалённо' }], form.format, 'order-format'))}
            <button class="btn" type="button" data-action="publish">Опубликовать заказ</button>
            <p class="status ${state.status === 'Откройте через Telegram' ? 'alert' : ''}">${escapeHtml(state.status)}</p>
            ${state.publishedOrder ? orderCard(state.publishedOrder) : ''}
          </section>
        `;
      }

      function renderMine() {
        const items = ['Мои заказы', 'Мои отклики', 'Сделки', 'Баланс', 'Рейтинг', 'Настройки'];
        return `
          <section class="screen">
            <h1>Мои</h1>
            <div class="menu-list">
              ${items.map((item) => `<button type="button" data-section="${escapeHtml(item)}"><span>${escapeHtml(item)}</span><small>Пока пусто</small></button>`).join('')}
            </div>
            ${empty('Данных пока нет', 'Здесь появятся ваши заказы, отклики, сделки и баланс.')}
          </section>
        `;
      }

      function render() {
        const app = document.getElementById('app');
        app.innerHTML = state.tab === 'create' ? renderCreate() : state.tab === 'mine' ? renderMine() : renderFind();
        document.querySelectorAll('[data-tab]').forEach((button) => {
          button.classList.toggle('active', button.dataset.tab === state.tab);
        });
        updateMainButton();
      }

      function updateMainButton() {
        if (!tg?.MainButton) return;
        if (state.tab === 'find') {
          tg.MainButton.setText('Найти');
          tg.MainButton.show();
        } else if (state.tab === 'create') {
          tg.MainButton.setText('Опубликовать заказ');
          tg.MainButton.show();
        } else {
          tg.MainButton.hide();
        }
      }

      function runMainAction() {
        if (state.tab === 'find') runFind();
        if (state.tab === 'create') publishOrder();
      }

      function runFind() {
        state.workers = workersFor(state.find);
        send('find_workers', { ...state.find, resultCount: state.workers.length });
        render();
      }

      function selectWorker(id) {
        const worker = state.workers.find((item) => item.id === id);
        if (!worker) return;
        send('select_worker', { worker, request: state.find });
        render();
      }

      function publishOrder() {
        const order = {
          id: `order-${Date.now()}`,
          title: state.order.description.trim() || 'Новый заказ',
          category: state.order.category,
          budget: state.order.budget.trim() || 'договорная',
          location: state.order.format === 'remote' ? 'Удалённо' : state.order.location.trim() || 'Рядом',
          urgency: state.order.urgency === 'today' ? 'Сегодня' : 'На этой неделе'
        };
        state.publishedOrder = order;
        send('publish_order', { ...state.order, order });
        render();
      }

      document.addEventListener('input', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const key = target.dataset.input;
        if (!key) return;
        const value = target.value;
        if (key === 'find.text') state.find.text = value;
        if (key === 'order.description') state.order.description = value;
        if (key === 'order.location') state.order.location = value;
        if (key === 'order.budget') state.order.budget = value;
      });

      document.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        if (target.dataset.tab) {
          state.tab = target.dataset.tab;
          state.status = '';
          render();
          return;
        }

        if (target.dataset.findCategory) state.find.category = target.dataset.findCategory;
        if (target.dataset.findFormat) state.find.format = target.dataset.findFormat;
        if (target.dataset.findTrust) state.find.trust = target.dataset.findTrust;
        if (target.dataset.orderCategory) state.order.category = target.dataset.orderCategory;
        if (target.dataset.orderUrgency) state.order.urgency = target.dataset.orderUrgency;
        if (target.dataset.orderFormat) state.order.format = target.dataset.orderFormat;

        if (target.dataset.action === 'find') {
          runFind();
          return;
        }
        if (target.dataset.action === 'publish') {
          publishOrder();
          return;
        }
        if (target.dataset.worker) {
          selectWorker(target.dataset.worker);
          return;
        }
        if (target.dataset.section) {
          send('open_profile_section', { section: target.dataset.section });
          render();
          return;
        }

        render();
      });

      tg?.MainButton?.onClick(runMainAction);
      render();
    </script>
  </body>
</html>
